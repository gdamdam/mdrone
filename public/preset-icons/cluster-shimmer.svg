<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round">
  <!-- Dense vertical cluster — tightly packed sruti pitches -->
  <line x1="9" y1="8" x2="9" y2="24"/>
  <line x1="12" y1="8" x2="12" y2="24"/>
  <line x1="15" y1="8" x2="15" y2="24"/>
  <line x1="18" y1="8" x2="18" y2="24"/>
  <line x1="21" y1="8" x2="21" y2="24"/>
  <!-- Shimmer dots above and below — spectral halo around the cluster -->
  <circle cx="10" cy="5" r="0.9" fill="#000"/>
  <circle cx="15" cy="4" r="0.9" fill="#000"/>
  <circle cx="20" cy="5" r="0.9" fill="#000"/>
  <circle cx="9" cy="28" r="0.9" fill="#000" opacity="0.6"/>
  <circle cx="15" cy="29" r="0.9" fill="#000" opacity="0.6"/>
  <circle cx="21" cy="28" r="0.9" fill="#000" opacity="0.6"/>
</svg>
