name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      # NOTE: `npm run lint` is intentionally NOT gated yet.
      # Main has a pre-existing `react-hooks/set-state-in-effect` error
      # in src/components/DropdownSelect.tsx (unrelated to this CI setup).
      # Re-enable this step once that pre-existing issue is fixed:
      #   - name: Lint
      #     run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (node --test, legacy)
        run: npm test

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
