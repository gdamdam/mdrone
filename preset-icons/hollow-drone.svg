<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round">
  <!-- Two pillars — the open fifth: tonic and fifth, hollow gap between -->
  <line x1="9" y1="5" x2="9" y2="27"/>
  <line x1="23" y1="5" x2="23" y2="27"/>
  <!-- Thin bridge line suggests the 3/2 interval spanning the void -->
  <line x1="12" y1="16" x2="20" y2="16" stroke-width="1.2" opacity="0.45"/>
</svg>
