<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a0f08" />
    <title>mdrone — offline</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0d0906;
        color: #e8d6bf;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 32px;
        box-sizing: border-box;
        text-align: center;
      }
      .wrap { max-width: 440px; }
      h1 {
        font-size: 18px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        font-weight: 800;
        margin: 0 0 18px;
        color: #f0b878;
      }
      p { font-size: 14px; line-height: 1.55; opacity: 0.82; margin: 0 0 14px; }
      button {
        margin-top: 18px;
        background: #f0b878;
        color: #160c06;
        border: none;
        padding: 10px 18px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
      small { opacity: 0.5; font-size: 11px; display: block; margin-top: 22px; letter-spacing: 0.4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>mdrone is offline</h1>
      <p>This share link hasn't been cached on this device yet. Open it once with a network connection and it will work offline from then on.</p>
      <p>If you were already using mdrone, try again — the instrument shell is cached.</p>
      <button onclick="location.reload()">Retry</button>
      <small>no account · no tracking · works on a plane after first load</small>
    </div>
  </body>
</html>
