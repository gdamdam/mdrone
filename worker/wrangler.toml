name = "mdrone-share"
main = "worker.ts"
compatibility_date = "2024-11-01"

# Served at sd.mpump.live. Route configured via the Cloudflare dashboard
# under the existing *.mpump.live zone (same account as s.mpump.live).
routes = [
  { pattern = "sd.mpump.live/*", zone_name = "mpump.live" }
]

# Bundle .wasm as CompiledWasm so @resvg/resvg-wasm/index_bg.wasm can be
# imported directly as a WebAssembly.Module — wrangler binds it at build
# time instead of needing a fetch() round-trip.
rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true }
]

[define]
__APP_VERSION__ = '"1.7.2"'
