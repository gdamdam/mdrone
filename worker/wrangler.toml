name = "mdrone-share"
main = "worker.ts"
compatibility_date = "2024-11-01"

# Served at s.mdrone.org. Route configured via the Cloudflare dashboard
# under the mdrone.org zone.
routes = [
  { pattern = "s.mdrone.org/*", zone_name = "mdrone.org" }
]

# KV namespace for short-URL storage. `preview_id` reuses the production
# namespace — create a separate one via `wrangler kv namespace create SHORT
# --preview` and swap the id below if you need dev/prod isolation.
[[kv_namespaces]]
binding = "SHORT"
id = "232eee982a4546fe814ca4541c3724c5"
preview_id = "232eee982a4546fe814ca4541c3724c5"
